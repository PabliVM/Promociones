<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Campograma">
<meta name="theme-color" content="#0f1729">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Campograma RM</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --verde:#77ED85;--verde-dk:#003300;--verde-bd:#4ade80;
  --naranja:#FF8C00;--naranja-bd:#e07800;
  --rojo:#e53e3e;--rojo-bd:#c53030;
  --azul:#3b82f6;--azul-bd:#2563eb;
  --gris-bg:#e5e7eb;--gris-color:#374151;
  --rm-dark:#0a0f1e;--rm-blue:#003087;--rm-gold:#c8a800;
  --border:#e2e8f0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--rm-dark);font-family:'Barlow',sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom,60px);padding-left:env(safe-area-inset-left,0);padding-right:env(safe-area-inset-right,0);}

/* HEADER */
.app-header{background:linear-gradient(135deg,#001a52,#0a1628);padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--rm-gold);position:sticky;top:0;z-index:200;}
.header-badge{width:44px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.header-badge img{width:44px;height:44px;object-fit:contain;}
.header-title h1{color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;letter-spacing:1px;}
.header-title p{color:var(--rm-gold);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;}
.header-actions{margin-left:auto;display:flex;gap:6px;}
.hdr-btn{padding:5px 10px;border-radius:8px;border:1px solid rgba(200,168,0,.4);background:rgba(200,168,0,.1);color:var(--rm-gold);font-size:9px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .15s;white-space:nowrap;}
.hdr-btn:hover{background:var(--rm-gold);color:#000;}

/* TABS */
.tabs-scroll{overflow-x:auto;padding:7px 12px 4px;display:flex;gap:5px;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;}
.tabs-scroll::-webkit-scrollbar{display:none;}
.tab-dia{flex-shrink:0;padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);transition:all .15s;}
.tab-dia.active{background:#fff;color:var(--rm-dark);}
.tab-n{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;font-size:8px;font-weight:700;margin-left:3px;background:var(--verde);color:var(--verde-dk);}
.tab-dia.active .tab-n{background:var(--rm-blue);color:#fff;}
.tab-eq{flex-shrink:0;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.45);font-size:10px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .15s;}
.tab-eq.active{background:var(--verde);color:var(--verde-dk);border-color:var(--verde);}

/* LEYENDA */
.leyenda{display:flex;gap:8px;flex-wrap:wrap;padding:4px 14px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.05);}
.ley-item{display:flex;align-items:center;gap:4px;}
.ley-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.ley-txt{color:rgba(255,255,255,.45);font-size:9px;}

/* SAVE BAR */
.save-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:5px 12px 7px;background:rgba(255,255,255,.03);border-bottom:2px solid rgba(200,168,0,.15);}
.save-btn{padding:6px 16px;border-radius:10px;border:none;background:var(--rm-gold);color:#000;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .2s;display:flex;align-items:center;gap:5px;}
.save-btn:hover{background:#e0bc00;transform:scale(1.02);}
.save-btn:active{transform:scale(.98);}
.save-btn.saving{background:var(--verde);color:var(--verde-dk);}
.save-status{color:rgba(255,255,255,.4);font-size:9px;font-weight:600;letter-spacing:.5px;}
.save-status.saved{color:var(--verde);}

/* COPY BAR */
.copy-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:5px 12px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.07);}
.copy-bar-lbl{color:rgba(255,255,255,.5);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
.copy-btn{padding:3px 9px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .15s;white-space:nowrap;}
.copy-btn:hover{background:var(--rm-gold);color:#000;border-color:var(--rm-gold);}
.copy-btn.copy-active{background:var(--verde);color:var(--verde-dk);border-color:var(--verde-bd);}

/* MODAL PLANTILLAS */
#plant-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10002;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:16px 12px;}
#plant-overlay.show{display:flex;}
#plant-box{background:#1e293b;border:1px solid rgba(200,168,0,.35);border-radius:14px;width:100%;max-width:560px;box-shadow:0 12px 48px rgba(0,0,0,.7);}
#plant-hdr{background:linear-gradient(135deg,#001a52,#0a1628);padding:12px 16px;border-radius:14px 14px 0 0;border-bottom:2px solid var(--rm-gold);display:flex;align-items:center;justify-content:space-between;}
#plant-hdr h2{color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:1px;}
#plant-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;}
#plant-close:hover{color:#fff;}
#plant-eq-tabs{display:flex;gap:4px;flex-wrap:wrap;padding:10px 14px 0;}
.plant-eq-tab{padding:4px 10px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .15s;}
.plant-eq-tab.active{border-color:var(--rm-gold);background:rgba(200,168,0,.15);color:var(--rm-gold);}
#plant-body{padding:12px 14px 16px;}
#plant-eq-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:var(--rm-gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
#plant-add-row{display:flex;gap:6px;margin-bottom:10px;}
#plant-add-input{flex:1;padding:7px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;outline:none;}
#plant-add-input::placeholder{color:rgba(255,255,255,.3);font-weight:400;text-transform:none;letter-spacing:0;}
#plant-add-input:focus{border-color:var(--rm-gold);}
#plant-add-btn{padding:7px 14px;border-radius:8px;border:none;background:var(--rm-gold);color:#000;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
#plant-add-btn:hover{background:#e0bc00;}
#plant-list{display:flex;flex-direction:column;gap:3px;max-height:340px;overflow-y:auto;padding-right:2px;}
.plant-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);}
.plant-row:hover{background:rgba(255,255,255,.08);}
.plant-num{font-size:9px;color:rgba(255,255,255,.3);width:16px;text-align:right;flex-shrink:0;}
.plant-name{flex:1;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.plant-del{background:none;border:none;color:rgba(239,68,68,.6);font-size:15px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;}
.plant-del:hover{color:#ef4444;}
.plant-count{color:rgba(255,255,255,.3);font-size:10px;margin-bottom:6px;}

/* AUTOCOMPLETE */
.zona-add{position:relative;margin-top:5px;}
.zona-add-input{
  width:100%;padding:4px 28px 4px 8px;
  border:1px dashed #cbd5e1;border-radius:6px;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.3px;
  background:rgba(0,0,0,.03);color:#374151;outline:none;
  transition:border-color .15s,background .15s;
}
.zona-add-input:focus{border-color:#94a3b8;background:#fff;}
.zona-add-input::placeholder{color:#94a3b8;font-weight:400;text-transform:none;letter-spacing:0;}
.zona-add-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:#94a3b8;font-size:14px;line-height:1;padding:0;}
.zona-add-clear:hover{color:#374151;}
.ac-list{
  position:absolute;z-index:500;left:0;right:0;top:calc(100% + 2px);
  background:#fff;border:1px solid #e2e8f0;border-radius:6px;
  box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:160px;overflow-y:auto;
  display:none;
}
.ac-list.open{display:block;}
.ac-item{
  padding:5px 9px;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
  cursor:pointer;border-bottom:1px solid #f1f5f9;color:#0f172a;
  display:flex;align-items:center;justify-content:space-between;
}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.ac-sel{background:#f0fdf4;color:#166534;}
.ac-item .ac-eq{font-size:8px;font-weight:400;color:#94a3b8;letter-spacing:.2px;text-transform:none;}
.c-prueba{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;font-style:italic;}
.c-multi{outline:2px solid #ef4444;outline-offset:1px;box-shadow:0 0 0 3px rgba(239,68,68,.25);}
.ac-prueba-hint{padding:4px 9px 5px;font-size:9px;color:#94a3b8;border-top:1px dashed #e2e8f0;font-style:italic;}

/* ── CALENDARIO SEMANA ── */
#cal-overlay{position:fixed;inset:0;z-index:10010;background:rgba(0,0,0,.55);display:none;align-items:flex-start;justify-content:center;padding-top:60px;}
#cal-overlay.open{display:flex;}
#cal-box{background:#0f1729;border:1px solid rgba(200,168,0,.3);border-radius:14px;padding:16px;width:320px;max-width:92vw;box-shadow:0 8px 32px rgba(0,0,0,.6);}
#cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
#cal-mes{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#C8A800;text-transform:uppercase;letter-spacing:1px;}
.cal-nav{background:none;border:1px solid rgba(200,168,0,.3);color:#C8A800;border-radius:8px;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:rgba(255,255,255,.35);padding:2px 0 6px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.cal-day{text-align:center;padding:7px 2px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(255,255,255,.75);cursor:pointer;font-family:'Barlow Condensed',sans-serif;transition:background .15s;}
.cal-day:hover{background:rgba(200,168,0,.2);}
.cal-day.otro-mes{color:rgba(255,255,255,.2);}
.cal-day.hoy{color:#C8A800;}
.cal-day.lunes-sel{background:#C8A800;color:#000;font-weight:900;border-radius:8px 0 0 8px;}
.cal-day.semana-sel{background:rgba(200,168,0,.18);color:#fff;}
.cal-day.semana-sel.domingo-sel{border-radius:0 8px 8px 0;}
.cal-day.vacio{cursor:default;}
#cal-footer{margin-top:12px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
#cal-sel-txt{font-size:11px;color:rgba(255,255,255,.5);font-family:'Barlow Condensed',sans-serif;}
#cal-ok{padding:8px 20px;background:#C8A800;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;}
#cal-cancel{padding:8px 14px;background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);border-radius:8px;font-size:13px;cursor:pointer;}
.ac-group-hdr{
  padding:5px 9px 3px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;
  color:#fff;background:#0f1729;
  border-bottom:1px solid #1e3a5f;
  position:sticky;top:0;z-index:1;
}
/* col inputs smaller */
.col .zona-add-input{font-size:10px;padding:3px 22px 3px 6px;}
.col .ac-item{font-size:10px;padding:4px 7px;}

/* GRID */
.cards-grid{padding:10px;display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:640px){.cards-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:1100px){.cards-grid{grid-template-columns:repeat(3,1fr);}}

/* CARD */
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.card-hdr{background:#0f1729;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--rm-gold);}
.card-hdr-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;color:#fff;letter-spacing:1px;text-transform:uppercase;}
.card-hdr-right{display:flex;align-items:center;gap:6px;}
.card-hdr-count{font-size:10px;color:rgba(255,255,255,.55);background:rgba(255,255,255,.08);padding:2px 7px;border-radius:10px;cursor:pointer;transition:all .15s;}
.card-hdr-count:hover{background:var(--rm-gold);color:#000;}
/* .card-hdr-count[title]::after removed */
.snap-btn{padding:2px 7px;border-radius:8px;border:1px solid rgba(200,168,0,.4);background:rgba(200,168,0,.1);color:var(--rm-gold);font-size:8px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.3px;transition:all .15s;}
.snap-btn:hover{background:var(--rm-gold);color:#000;}

/* CAMPO */
.campo-wrap{position:relative;width:100%;padding-bottom:118%;background:linear-gradient(180deg,#2d6a2d 0%,#1e4d1e 50%,#2d6a2d 100%);overflow:hidden;}
.campo-wrap.dz-active{outline:3px solid var(--verde);outline-offset:-3px;}
.campo-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.campo-players{position:absolute;inset:0;pointer-events:none;}
.pof{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;max-width:30%;transition:top .25s ease,left .25s ease;}
.pof.no-anim{transition:none;}
.pof .chip{font-size:clamp(10px,2.4vw,15px);padding:3px 6px;width:100%;text-align:center;box-shadow:0 1px 5px rgba(0,0,0,.55);}

/* CHIP */
.chip{display:inline-flex;align-items:center;justify-content:center;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:3px 7px;cursor:grab;user-select:none;touch-action:none;white-space:nowrap;-webkit-user-select:none;transition:box-shadow .1s,opacity .1s;}
.chip:active{cursor:grabbing;}
.chip.dragging{opacity:.25;}
/* Colores de zona — todos neutros, sin color por zona */
.c-verde,.c-naranja,.c-rojo,.c-azul,.c-gris{background:#f1f5f9;color:#1e293b;border:1px solid #cbd5e1;}
.c-prestado{background:#7c3aed;color:#fff;border:1px solid #6d28d9;}
.c-prestado-CASTILLA{background:#003087;color:#fff;border:1px solid #003087;}
.c-prestado-RMC{background:#7030A0;color:#fff;border:1px solid #7030A0;}
.c-prestado-JUVENIL_A{background:#FFC000;color:#1a1a1a;border:1px solid #FFC000;}
.c-prestado-JUVENIL_B{background:#275317;color:#fff;border:1px solid #275317;}
.c-prestado-JUVENIL_C{background:#D80E9E;color:#fff;border:1px solid #D80E9E;}
.c-prestado-CADETE_A{background:#0070C0;color:#fff;border:1px solid #0070C0;}

/* ZONA DISPONIBLES */
.zona-disponibles{padding:7px 10px;background:#f8fafc;border-top:2px solid var(--border);min-height:48px;}
.zona-disponibles.dz-active{background:#f0fdf4;outline:2px dashed var(--verde-bd);outline-offset:-2px;}

/* ZONA BANQUILLO */
.zona-banquillo{padding:7px 10px;background:#eff6ff;border-top:2px solid #bfdbfe;min-height:44px;}
.zona-banquillo.dz-active{background:#dbeafe;outline:2px dashed var(--azul);outline-offset:-2px;}

/* COLUMNAS ESTADO */
.cols-estado{display:grid;border-top:2px solid var(--border);}
.col{padding:6px 8px;min-height:46px;}
.col:not(:last-child){border-right:1px solid var(--border);}
.col.dz-active{outline:2px dashed currentColor;outline-offset:-2px;}
.col-prom{background:#fff8f0;}  .col-prom.dz-active{background:#fff3e0;}
.col-les {background:#fff5f5;}  .col-les.dz-active {background:#fee2e2;}
.col-otros{background:#f9fafb;} .col-otros.dz-active{background:#f3f4f6;}
.col-extra{background:#f5f3ff;} .col-extra.dz-active{background:#ede9fe;}
.zona-lbl-wrap{display:flex;align-items:center;gap:3px;margin-bottom:4px;}
.zona-lbl-edit{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;border:none;background:transparent;
  outline:none;cursor:pointer;padding:0;width:100%;min-width:30px;}
.zona-lbl-edit:focus{border-bottom:1px solid currentColor;cursor:text;}
.col-prom  .zona-lbl-edit{color:var(--naranja);}
.col-les   .zona-lbl-edit{color:var(--rojo);}
.col-otros .zona-lbl-edit{color:#6b7280;}
.col-extra .zona-lbl-edit{color:#7c3aed;}
.col-add-btn{flex-shrink:0;width:14px;height:14px;border-radius:3px;border:1px dashed #cbd5e1;
  background:none;cursor:pointer;font-size:10px;line-height:1;color:#94a3b8;display:flex;
  align-items:center;justify-content:center;}
.col-add-btn:hover{background:#e0e7ff;color:#4f46e5;border-color:#a5b4fc;}
.col-del-btn{flex-shrink:0;width:12px;height:12px;border:none;background:none;
  cursor:pointer;font-size:10px;line-height:1;color:rgba(0,0,0,.2);padding:0;}
.col-del-btn:hover{color:#ef4444;}

.zona-lbl{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.zona-disponibles .zona-lbl{color:#64748b;}
.zona-banquillo   .zona-lbl{color:#2563eb;}
.col-prom .zona-lbl{color:var(--naranja);}
.col-les  .zona-lbl{color:var(--rojo);}
.col-otros .zona-lbl{color:#6b7280;}

.chips-wrap{display:flex;flex-wrap:wrap;gap:3px;}
.col .chips-wrap{flex-direction:column;flex-wrap:nowrap;}
.col .chip{font-size:9px;padding:2px 5px;width:100%;text-align:center;justify-content:center;}
.zona-banquillo .chips-wrap{gap:3px;}

/* MODAL REGISTRO */
#reg-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:10001;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px 12px;}
#reg-overlay.show{display:flex;}
#reg-box{background:#1e293b;border:1px solid rgba(200,168,0,.35);border-radius:14px;padding:0;max-width:680px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.6);}
#reg-header{background:linear-gradient(135deg,#001a52,#0a1628);padding:14px 18px;border-radius:14px 14px 0 0;border-bottom:2px solid var(--rm-gold);display:flex;align-items:center;justify-content:space-between;}
#reg-header h2{color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:1px;}
#reg-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;padding:0 4px;}
#reg-close:hover{color:#fff;}
#reg-body{padding:16px 18px;}
#reg-search{width:100%;padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff;font-size:12px;margin-bottom:12px;outline:none;}
#reg-search::placeholder{color:rgba(255,255,255,.35);}
#reg-table-wrap{overflow-x:auto;}
#reg-table{width:100%;border-collapse:collapse;font-size:11px;}
#reg-table th{background:#0f1729;color:var(--rm-gold);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;text-align:center;border:1px solid rgba(255,255,255,.08);white-space:nowrap;}
#reg-table th:first-child{text-align:left;min-width:120px;}
#reg-table td{padding:4px 6px;border:1px solid rgba(255,255,255,.06);text-align:center;color:rgba(255,255,255,.8);}
#reg-table td:first-child{text-align:left;color:#fff;font-weight:600;font-family:'Barlow Condensed',sans-serif;font-size:12px;}
#reg-table tr:nth-child(even) td{background:rgba(255,255,255,.03);}
.reg-day-cell{padding:3px 5px!important;}
.reg-dot{display:inline-block;width:20px;height:20px;border-radius:4px;font-size:9px;font-weight:700;line-height:20px;text-align:center;}
.reg-dot.active{background:var(--verde);color:var(--verde-dk);}
.reg-dot.banco{background:var(--azul);color:#fff;}
.reg-dot.empty{background:rgba(255,255,255,.06);color:rgba(255,255,255,.2);}
.reg-total{background:rgba(200,168,0,.15)!important;color:var(--rm-gold)!important;font-weight:700!important;}

/* ALERT */
#alert-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;display:none;align-items:center;justify-content:center;}
#alert-overlay.show{display:flex;}
#alert-box{background:#1e293b;border:1px solid rgba(200,168,0,.4);border-radius:12px;padding:20px 22px;max-width:300px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.5);}
#alert-msg{color:#fff;font-size:13px;line-height:1.5;margin-bottom:14px;}
#alert-btns{display:flex;gap:8px;justify-content:flex-end;}
.alert-btn{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.alert-ok{background:var(--rm-gold);color:#000;}
.alert-ok:hover{background:#e0bc00;}
.alert-cancel{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);}
.alert-cancel:hover{background:rgba(255,255,255,.2);}

/* GHOST / TOAST */
#ghost{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%) scale(1.08);opacity:.85;display:none;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(14px);background:#1e293b;color:#fff;padding:7px 16px;border-radius:20px;font-size:11px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:9999;white-space:nowrap;border:1px solid rgba(255,255,255,.1);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="ghost"></div>
<div id="alert-overlay">
  <div id="alert-box">
    <div id="alert-msg"></div>
    <div id="alert-btns">
      <button class="alert-btn alert-cancel" onclick="closeAlert()">Cancelar</button>
      <button class="alert-btn alert-ok" id="alert-ok-btn">Añadir</button>
    </div>
  </div>
</div>

<!-- MODAL REGISTRO -->
<div id="reg-overlay">
  <div id="reg-box">
    <div id="reg-header">
      <h2>📊 Registro de Entrenamiento</h2>
      <button id="reg-close" onclick="closeReg()">✕</button>
    </div>
    <div id="reg-body">
      <input id="reg-search" type="text" placeholder="Buscar jugador…" oninput="renderReg()"/>
      <div id="reg-table-wrap"><table id="reg-table"><thead id="reg-thead"></thead><tbody id="reg-tbody"></tbody></table></div>
    </div>
  </div>
</div>

<!-- MODAL PLANTILLAS -->
<div id="plant-overlay">
  <div id="plant-box">
    <div id="plant-hdr">
      <h2>👥 Gestión de Plantillas</h2>
      <button id="plant-close" onclick="closePlant()">✕</button>
    </div>
    <div id="plant-eq-tabs" id="plant-tabs"></div>
    <div id="plant-body">
      <div id="plant-eq-title"></div>
      <div id="plant-add-row">
        <input id="plant-add-input" type="text" placeholder="Nombre del jugador…" onkeydown="if(event.key==='Enter')plantAñadir()"/>
        <button id="plant-add-btn" onclick="plantAñadir()">+ Añadir</button>
      </div>
      <div id="plant-count"></div>
      <div id="plant-list"></div>
    </div>
  </div>
</div>

function calcFechasSemana(lunesBase){
  const base = lunesBase ? new Date(lunesBase) : (()=>{
    const hoy = new Date();
    const d = hoy.getDay(); // 0=dom
    const diff = d===0 ? -6 : 1-d;
    const lun = new Date(hoy); lun.setDate(hoy.getDate()+diff); return lun;
  })();
  const fechas = {};
  DIAS.forEach((dia,i)=>{
    const f = new Date(base); f.setDate(base.getDate()+i);
    fechas[dia] = f.getDate()+'/'+(f.getMonth()+1);
  });
  return fechas;
}

let pos  = {};   // "dia|eq|nombre" → [top,left]
// Nombres editables de columnas por equipo: colNames[eq] = ['PROMOCIÓN','LESIÓN','OTROS']
let colNames = {};
// Info de promoción: promInfo[dia][eqOrigen][nombre] = 'CASTILLA' (equipo destino)
let promInfo = {};
let multiEq  = {}; // multiEq[dia][nombre] = [eq1, eq2, ...] — jugadores en varios equipos
function initPromInfo(){ DIAS.forEach(d=>{ promInfo[d]={}; EQUIPOS.forEach(eq=>{ promInfo[d][eq]={}; }); }); }
initPromInfo();
EQUIPOS.forEach(eq=> colNames[eq]=[eq==='CASTILLA'?'1ER EQUIPO':'PROMOCIÓN','LESIÓN','OTROS']);
// Zonas extra (4ª columna) por equipo: extraZonas[eq] = bool
let extraZonas = {};
EQUIPOS.forEach(eq=> extraZonas[eq]=false);
let drag = null;
let dOff = {x:0,y:0};

const key    = (d,e,n) => d+'|'+e+'|'+n;
const getPos = (d,e,n,i) => pos[key(d,e,n)] || POS_DEF[i%POS_DEF.length] || [50,50];
const savePos= (d,e,n,t,l) => pos[key(d,e,n)] = [clamp(t,2,96), clamp(l,2,97)];

// Zona del área (portero) — viewBox 0 0 100 118 — portero a partir de top 85%
const AREA_Y = 82;  // portero = top > 82% (rombo: 84%, 90%, 96%)

function esPortero(eq,nombre,i){
  const [t,l]=getPos(dia,eq,nombre,i);
  return t>84 && l>=24 && l<=76;
}
function countLabel(eq,campo){
  let p=0,j=0;
  campo.forEach((n,i)=>{ if(esPortero(eq,n,i)) p++; else j++; });
  return p===0 ? campo.length+'' : j+'+'+p+'P';
}
function updateCount(eq){
  const el=document.getElementById('count-'+eq.replace(/ /g,'_'));
  if(el) el.textContent=countLabel(eq,data[dia][eq].campo);
}

// ══════════════════════════════════════════════════
// SNAP AL SLOT MÁS CERCANO
// ══════════════════════════════════════════════════
function snapToGrid(eq, nombre, rawTop, rawLeft){
  const campo = data[dia][eq].campo;
  // Posiciones ya ocupadas (otros jugadores)
  const ocupadas = new Set();
  campo.forEach((n,i)=>{
    if(n !== nombre){
      const slotKey = SNAP_SLOTS.findIndex(([t,l])=>{
        const p = pos[key(dia,eq,n)] || POS_DEF[i%POS_DEF.length];
        return Math.abs(p[0]-t)<5 && Math.abs(p[1]-l)<5;
      });
      if(slotKey>=0) ocupadas.add(slotKey);
    }
  });

  // Encontrar slot libre más cercano al punto de drop
  let bestIdx=-1, bestDist=9999;
  SNAP_SLOTS.forEach(([t,l],idx)=>{
    if(ocupadas.has(idx)) return;
    const d=Math.hypot(rawTop-t, rawLeft-l);
    if(d<bestDist){ bestDist=d; bestIdx=idx; }
  });

  if(bestIdx>=0){
    return SNAP_SLOTS[bestIdx];
  }
  return [rawTop, rawLeft]; // fallback si no hay slot libre
}

// Reordenar todos los jugadores del campo a la formación ordenada
function autoAlinear(eq){
  const campo = data[dia][eq].campo;
  if(campo.length === 0) return;
  // Asignar los primeros N slots a los jugadores en orden
  campo.forEach((nombre, i)=>{
    const [t,l] = SNAP_SLOTS[i] || [50, 50];
    savePos(dia, eq, nombre, t, l);
  });
}

// ══════════════════════════════════════════════════
// AUTOCOMPLETE — desplegable para añadir jugadores
// ══════════════════════════════════════════════════

function candidatos(eq, zona){
  const todos = new Set();
  // Solo jugadores de OTROS equipos (nunca del propio)
  EQUIPOS.forEach(e=>{
    if(e===eq) return;
    (plantillas[e]||[]).forEach(n=>todos.add(n));
  });
  // Añadir jugadores en data de otros equipos por si no están en plantillas
  DIAS.forEach(d=> EQUIPOS.forEach(e=>{
    if(e===eq) return;
    ZONAS.forEach(z=> (data[d][e][z]||[]).forEach(n=>todos.add(n)));
  }));
  const enZona = new Set(data[dia][eq][zona]||[]);
  // También excluir los que ya están en cualquier zona de este equipo hoy
  const enEquipo = new Set();
  ZONAS.forEach(z=>(data[dia][eq][z]||[]).forEach(n=>enEquipo.add(n)));
  return [...todos]
    .filter(n=>!enZona.has(n) && !enEquipo.has(n))
    .sort((a,b)=>{
      const idxA=EQUIPOS.indexOf(origen[a]||''), idxB=EQUIPOS.indexOf(origen[b]||'');
      if(idxA!==idxB) return idxA-idxB;
      return a.localeCompare(b,'es');
    });
}

function buildAddInput(eq, zona){
  const wrap  = mk('div','zona-add');
  const input = mk('input','zona-add-input');
  input.type='text';
  input.placeholder='+ Añadir jugador…';
  const clearBtn = mk('button','zona-add-clear');
  clearBtn.textContent='×'; clearBtn.tabIndex=-1;
  clearBtn.onmousedown=(e)=>{e.preventDefault();input.value='';list.classList.remove('open');input.focus();};
  const list = mk('div','ac-list');
  let selIdx = -1;

  function filtrar(){
    const q = input.value.trim().toLowerCase();
    list.innerHTML=''; selIdx=-1;
    const todos = candidatos(eq,zona).filter(n=>!q||n.toLowerCase().includes(q));
    const hayResultados = todos.length > 0;

    if(hayResultados){
      // Agrupar por equipo de origen
      const grupos = {};
      todos.forEach(nombre=>{
        const eqO = origen[nombre] || '—';
        if(!grupos[eqO]) grupos[eqO]=[];
        grupos[eqO].push(nombre);
      });
      const ordenGrupos = [...EQUIPOS.filter(e=>e!==eq)].filter(e=>grupos[e]);
      ordenGrupos.forEach(grupo=>{
        const hdr = mk('div','ac-group-hdr');
        hdr.textContent = grupo;
        list.appendChild(hdr);
        grupos[grupo].forEach(nombre=>{
          const it = mk('div','ac-item');
          it.dataset.nombre=nombre;
          it.textContent=nombre;
          it.onmousedown=(e)=>{e.preventDefault();elegir(nombre);};
          list.appendChild(it);
        });
      });
    }

    // Opción "a prueba": si hay texto escrito y no coincide exacto con nadie
    if(zona==='disponibles' && q.length>1){
      const qUp = q.toUpperCase().trim();
      const exacto = todos.some(n=>n.toUpperCase()===qUp);
      if(!exacto){
        const hint = mk('div','ac-prueba-hint');
        hint.textContent = '⚡ Añadir "'+qUp+'" como jugador a prueba';
        hint.onmousedown=(e)=>{ e.preventDefault(); elegirPrueba(qUp); };
        list.appendChild(hint);
      }
    }

    if(list.children.length>0) list.classList.add('open');
    else list.classList.remove('open');
  }

  function elegirPrueba(nombre){
    // Jugador a prueba: se marca en origen como null/'PRUEBA'
    origen[nombre] = 'PRUEBA';
    data[dia][eq].disponibles.push(nombre);
    toast('⚡ '+nombre+' añadido a prueba en '+eq);
    input.value=''; list.classList.remove('open');
    render();
  }

  function elegir(nombre){
    if(zona!=='campo'){
      // No contar la propia zona como duplicado
      const yaEsta=ZONAS.some(z=> z!==zona && (data[dia][eq][z]||[]).includes(nombre));
      if(yaEsta){
        showAlert('⚠️ '+nombre+' ya está en '+eq+'. ¿Añadir igualmente?',()=>{
          data[dia][eq][zona].push(nombre);
          toast(nombre+' → '+ZONA_NAMES[zona]);
          render();
        });
        input.value='';list.classList.remove('open');return;
      }
    }
    if(zona==='campo'){
      const n=data[dia][eq].campo.length;
      const [t,l]=SNAP_SLOTS[n%SNAP_SLOTS.length]||[50,50];
      savePos(dia,eq,nombre,t,l);
    }
    // ── Lógica de promoción / multi-equipo al añadir desde input
    const eqOrigen2 = origen[nombre];
    // ¿Ya tiene presencia activa en otro equipo hoy? (excluye promovidos_1er)
    const yaActivoEnOtro = EQUIPOS.some(e=> e!==eq &&
      ZONAS_ACTIVAS.some(z=>(data[dia][e]?.[z]||[]).includes(nombre))
    );
    if(yaActivoEnOtro){
      // Multi-equipo: aparece con borde rojo en ambos, no se mueve del original
      registrarMultiEq(dia, nombre, eq);
      EQUIPOS.filter(e=> e!==eq && ZONAS_ACTIVAS.some(z=>(data[dia][e]?.[z]||[]).includes(nombre)))
        .forEach(e=> registrarMultiEq(dia, nombre, e));
    } else if(eqOrigen2 && eqOrigen2 !== eq && eqOrigen2 !== 'PRUEBA'){
      // Promoción clásica: jugador de otro equipo → quitarlo de origen y añadir a promovidos
      autoPromocionar(nombre, eqOrigen2, eq);
    }

    data[dia][eq][zona].push(nombre);
    toast(nombre+' → '+ZONA_NAMES[zona]);
    input.value='';list.classList.remove('open');
    render();
  }

  input.addEventListener('input', filtrar);
  input.addEventListener('focus', filtrar);
  input.addEventListener('blur', ()=>setTimeout(()=>list.classList.remove('open'),150));
  input.addEventListener('keydown',(e)=>{
    const its=[...list.querySelectorAll('.ac-item')];
    if(e.key==='ArrowDown'){e.preventDefault();selIdx=Math.min(selIdx+1,its.length-1);its.forEach((it,i)=>it.classList.toggle('ac-sel',i===selIdx));}
    else if(e.key==='ArrowUp'){e.preventDefault();selIdx=Math.max(selIdx-1,0);its.forEach((it,i)=>it.classList.toggle('ac-sel',i===selIdx));}
    else if(e.key==='Enter'){e.preventDefault();if(selIdx>=0&&its[selIdx])elegir(its[selIdx].dataset.nombre);else if(its.length===1)elegir(its[0].dataset.nombre);}
    else if(e.key==='Escape'){list.classList.remove('open');input.blur();}
  });

  wrap.appendChild(input); wrap.appendChild(clearBtn); wrap.appendChild(list);
  return wrap;
}

// ══════════════════════════════════════════════════
// CAPTURA DE CAMPO
// ══════════════════════════════════════════════════
function capturarCampo(eq, card){
  if(typeof html2canvas === 'undefined'){ toast('❌ html2canvas no cargado'); return; }
  toast('📸 Generando imagen…');

  const d      = data[dia][eq];
  const fecha  = FECHAS[dia] || '';
  const esCas  = eq === 'CASTILLA';
  const colN   = colNames[eq] || ['PROMOCIÓN','LESIÓN','OTROS'];
  const proms  = d.promovidos_1er || [];
  const lesion = d.lesionados     || [];
  const otros  = d.otros          || [];
  const extra  = d.extra          || [];
  const isIOS  = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  const cWrap = card.querySelector('.campo-wrap');
  if(!cWrap){ toast('❌ No se encontró el campo'); return; }

  // Ocultar escudo: html2canvas no soporta mix-blend-mode
  const shieldEl = cWrap.querySelector('.campo-shield');
  if(shieldEl) shieldEl.style.visibility = 'hidden';

  html2canvas(cWrap, {
    scale: 2, useCORS: true, allowTaint: true,
    backgroundColor: '#1e4d1e', logging: false, imageTimeout: 0
  }).then(fieldCanvas=>{
    // Restaurar escudo en la UI
    if(shieldEl) shieldEl.style.visibility = '';

    // Dimensiones del canvas compuesto
    const W       = 800;
    const HEADER_H = 80;
    const FIELD_H  = Math.round(W * 1.18);
    const ROW_H    = 28;
    const maxRows  = Math.max(proms.length, lesion.length, otros.length, extra.length, 1);
    const COL_H    = 30 + maxRows * ROW_H + 16;
    const H        = HEADER_H + FIELD_H + COL_H + 10;

    const cv  = document.createElement('canvas');
    cv.width  = W; cv.height = H;
    const ctx = cv.getContext('2d');

    // Fondo
    ctx.fillStyle = '#0a1628';
    ctx.fillRect(0, 0, W, H);

    // Cabecera gradient
    const grad = ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,'#001a52'); grad.addColorStop(1,'#0a1628');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, HEADER_H);
    ctx.fillStyle = '#C8A800';
    ctx.fillRect(0, HEADER_H-2, W, 2);

    // Equipo arriba izquierda pequeño
    ctx.fillStyle = 'rgba(255,255,255,.55)';
    ctx.font = 'bold 13px sans-serif';
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    ctx.fillText(eq, 16, 10);

    // Fecha grande izquierda — LUNES DD/MM/AA
    const partesFecha = fecha.split('/');
    const aaStr = new Date().getFullYear().toString().slice(2);
    const fechaFmt = partesFecha.length===2
      ? (dia + '  ' + partesFecha[0] + '/' + partesFecha[1] + '/' + aaStr)
      : dia;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 32px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    ctx.fillText(fechaFmt, 16, HEADER_H/2 + 8);

    // Campo capturado
    ctx.drawImage(fieldCanvas, 0, HEADER_H, W, FIELD_H);

    function dibujarColumnas(){
      const colY = HEADER_H + FIELD_H + 8;
      const colDefs = [
        { label: esCas ? '1ER EQUIPO' : colN[0], items: proms,  color:'#7c3aed' },
        { label: colN[1],                          items: lesion, color:'#dc2626' },
        { label: colN[2],                          items: otros,  color:'#6b7280' },
      ];
      if(extra.length) colDefs.push({ label: colN[3]||'EXTRA', items: extra, color:'#0070C0' });

      const cW = Math.floor(W / colDefs.length);
      colDefs.forEach((col, ci)=>{
        const cx = ci * cW;
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = col.color;
        ctx.fillRect(cx+2, colY, cW-4, 30);
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 14px sans-serif';
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'left';
        ctx.fillText(col.label, cx+10, colY+15);
        col.items.forEach((nombre, ri)=>{
          const ry = colY + 30 + ri*ROW_H;
          ctx.fillStyle = ri%2===0 ? 'rgba(255,255,255,.07)' : 'transparent';
          ctx.fillRect(cx+2, ry, cW-4, ROW_H);
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 15px sans-serif';
          ctx.fillText(nombre, cx+10, ry+ROW_H/2);
        });
        if(!col.items.length){
          ctx.fillStyle = 'rgba(255,255,255,.35)';
          ctx.font = '14px sans-serif';
          ctx.fillText('—', cx+10, colY+30+ROW_H/2);
        }
      });
    }

    function finalizarYExportar(){
      // Columnas
      dibujarColumnas();

      // Exportar
      try{
        // Usar blob URL — más fiable en iOS Safari que base64
        cv.toBlob(blob => {
          if(!blob){ toast('❌ Error generando imagen'); return; }
          const blobUrl = URL.createObjectURL(blob);
          let ov = document.getElementById('photo-ov');
          if(ov) ov.remove();
          ov = document.createElement('div');
          ov.id = 'photo-ov';
          ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:env(safe-area-inset-top,16px) 16px env(safe-area-inset-bottom,16px);box-sizing:border-box;overflow-y:auto;-webkit-overflow-scrolling:touch;';
          const instruccion = isIOS
            ? '📥 Mantén pulsada la imagen → <b>Añadir a Fotos</b>'
            : '📥 Mantén pulsada la imagen para guardarla';
          const img = document.createElement('img');
          img.src = blobUrl;
          img.style.cssText = 'max-width:100%;max-height:70vh;border-radius:8px;border:2px solid #ffd700;display:block;';
          const p = document.createElement('p');
          p.innerHTML = instruccion;
          p.style.cssText = 'color:#ffd700;font-family:sans-serif;font-size:16px;text-align:center;margin:0;font-weight:700;';
          const btn = document.createElement('button');
          btn.textContent = 'Cerrar';
          btn.style.cssText = 'padding:14px 36px;background:#ffd700;border:none;border-radius:12px;font-weight:700;font-size:16px;cursor:pointer;min-height:48px;';
          btn.onclick = ()=>{ ov.remove(); URL.revokeObjectURL(blobUrl); };
          ov.appendChild(p);
          ov.appendChild(img);
          ov.appendChild(btn);
          document.body.appendChild(ov);
        }, 'image/png');
      }catch(e){ toast('❌ Error al generar imagen: '+e.message); }
    }

    // Sin escudo en la foto (más fiable en iOS)
    finalizarYExportar();

  }).catch(err=>{
    if(shieldEl) shieldEl.style.visibility = '';
    toast('❌ Error: '+err.message);
  });
}

// ── Exportar datos a fichero JSON
function exportarDatos(){
  try{
    const payload = {
      data, pos, plantillas, origen,
      colNames, extraZonas, promInfo, multiEq, fechas: FECHAS,
      ts: new Date().toISOString(),
      version: 'rm_cantera_v2'
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const fecha = new Date().toLocaleDateString('es-ES').replace(/\//g,'-');
    a.href = url;
    a.download = 'campograma_datos_'+fecha+'.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('✅ Datos exportados correctamente');
  }catch(e){ toast('❌ Error al exportar: '+e.message); }
}

// ── Abrir selector de fichero
function importarDatos(){
  document.getElementById('import-file').value = '';
  document.getElementById('import-file').click();
}

// ── Cargar fichero JSON importado
function cargarFicheroImport(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const payload = JSON.parse(e.target.result);
      if(!payload.data){ toast('❌ Fichero no válido'); return; }
      if(!confirm('¿Cargar estos datos? Se sobreescribirá todo lo actual.')){return;}
      if(payload.data)       data       = payload.data;
      if(payload.pos)        pos        = payload.pos;
      if(payload.plantillas) plantillas = payload.plantillas;
      if(payload.origen)     Object.assign(origen, payload.origen);
      if(payload.colNames)   colNames   = payload.colNames;
      if(payload.extraZonas) extraZonas = payload.extraZonas;
      if(payload.promInfo)   promInfo   = payload.promInfo;
    if(payload.multiEq)    multiEq    = payload.multiEq;
      if(payload.fechas)     Object.assign(FECHAS, payload.fechas);
      // Migración Castilla
      if(colNames['CASTILLA'] && colNames['CASTILLA'][0]==='PROMOCIÓN') colNames['CASTILLA'][0]='1ER EQUIPO';
      autoGuardar();
      render();
      renderDias();
      toast('✅ Datos cargados correctamente');
    }catch(err){ toast('❌ Error al leer fichero: '+err.message); }
  };
  reader.readAsText(file);
}

// Construir plantillas iniciales desde RAW (primer día, disponibles)
function buildPlantillasIniciales(){
  const p = {};
  EQUIPOS.forEach(eq=>{
    // Unir todos los jugadores que aparecen en ese equipo en RAW
    const set = new Set();
    DIAS.forEach(d=> ZONAS.forEach(z=> (RAW[d]?.[eq]?.[z]||[]).forEach(n=>set.add(n))));
    // Además los del origen
    Object.entries(origen).forEach(([n,e])=>{ if(e===eq) set.add(n); });
    p[eq] = [...set].sort((a,b)=>a.localeCompare(b,'es'));
  });
  return p;
}

let plantillas = buildPlantillasIniciales();
let plantEqActivo = EQUIPOS[0];

function openPlant(){
  document.getElementById('plant-overlay').classList.add('show');
  renderPlantTabs();
  renderPlantBody();
}
function closePlant(){
  document.getElementById('plant-overlay').classList.remove('show');
}

function renderPlantTabs(){
  const wrap = document.getElementById('plant-eq-tabs');
  wrap.innerHTML = '';
  EQUIPOS.forEach(eq=>{
    const btn = mk('button','plant-eq-tab'+(eq===plantEqActivo?' active':''));
    btn.textContent = eq + ' ('+( plantillas[eq]?.length||0)+')';
    btn.onclick = ()=>{ plantEqActivo=eq; renderPlantTabs(); renderPlantBody(); };
    wrap.appendChild(btn);
  });
}

function renderPlantBody(){
  const jugadores = plantillas[plantEqActivo] || [];
  document.getElementById('plant-eq-title').textContent = plantEqActivo;
  document.getElementById('plant-count').textContent = jugadores.length + ' jugadores';
  document.getElementById('plant-add-input').value = '';

  const list = document.getElementById('plant-list');
  list.innerHTML = '';
  jugadores.forEach((nombre, i)=>{
    const row = mk('div','plant-row');
    const num = mk('span','plant-num'); num.textContent = (i+1);
    const nm  = mk('span','plant-name'); nm.textContent = nombre;
    const del = mk('button','plant-del'); del.textContent = '×';
    del.title = 'Eliminar '+nombre;
    del.onclick = ()=> plantEliminar(nombre);
    row.appendChild(num); row.appendChild(nm); row.appendChild(del);
    list.appendChild(row);
  });
}

function plantAñadir(){
  const input = document.getElementById('plant-add-input');
  const nombre = input.value.trim().toUpperCase();
  if(!nombre){ input.focus(); return; }
  if(!plantillas[plantEqActivo]) plantillas[plantEqActivo]=[];
  if(plantillas[plantEqActivo].includes(nombre)){
    toast('⚠️ '+nombre+' ya está en '+plantEqActivo);
    return;
  }
  plantillas[plantEqActivo].push(nombre);
  plantillas[plantEqActivo].sort((a,b)=>a.localeCompare(b,'es'));
  // Actualizar origen
  origen[nombre] = plantEqActivo;
  // Añadir a disponibles de todos los días
  DIAS.forEach(d=>{
    if(!data[d][plantEqActivo].disponibles.includes(nombre) &&
       !ZONAS.some(z=>data[d][plantEqActivo][z].includes(nombre))){
      data[d][plantEqActivo].disponibles.push(nombre);
    }
  });
  input.value = '';
  input.focus();
  renderPlantTabs();
  renderPlantBody();
  autoGuardar();
  render();  // actualizar campograma inmediatamente
  toast('✅ '+nombre+' añadido a '+plantEqActivo);
}

function plantEliminar(nombre){
  if(!plantillas[plantEqActivo]) return;
  const idx = plantillas[plantEqActivo].indexOf(nombre);
  if(idx<0) return;
  plantillas[plantEqActivo].splice(idx,1);
  // Quitar de origen si era de este equipo
  if(origen[nombre]===plantEqActivo) delete origen[nombre];
  // Quitar de data en todos los días
  DIAS.forEach(d=>{
    ZONAS.forEach(z=>{
      const i=(data[d][plantEqActivo][z]||[]).indexOf(nombre);
      if(i>=0) data[d][plantEqActivo][z].splice(i,1);
    });
  });
  renderPlantTabs();
  renderPlantBody();
  render();
  toast('🗑️ '+nombre+' eliminado de '+plantEqActivo);
}

const LS_KEY = 'rm_cantera_v2';

// Guardado silencioso — llamado automáticamente en cada cambio
let _autoSaveTimer = null;
function autoGuardar(){
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(()=>{
    try{
      const payload = {
        data: data,
        pos:  pos,
        plantillas: plantillas,
        origen: origen,
        colNames: colNames,
        extraZonas: extraZonas,
        promInfo: promInfo,
        multiEq: multiEq,
        fechas: FECHAS,
        ts: new Date().toISOString()
      };
      localStorage.setItem(LS_KEY, JSON.stringify(payload));
      // Actualizar indicador de estado (sin toast)
      const ahora = new Date();
      const hhmm  = ahora.getHours().toString().padStart(2,'0')+':'+ahora.getMinutes().toString().padStart(2,'0');
      const st = document.getElementById('save-status');
      if(st){ st.textContent='Auto-guardado: '+hhmm; st.classList.add('saved'); }
    }catch(e){ /* silencioso */ }
  }, 400); // debounce 400ms para no saturar en drag
}

// Guardado manual con feedback visual
function guardarDia(){
  try{
    const payload = {
      data: data,
      pos:  pos,
      plantillas: plantillas,
      origen: origen,
      ts: new Date().toISOString()
    };
    localStorage.setItem(LS_KEY, JSON.stringify(payload));
    const btn = document.getElementById('save-btn');
    const st  = document.getElementById('save-status');
    btn.classList.add('saving');
    btn.textContent='✓ Guardado';
    const ahora = new Date();
    const hhmm  = ahora.getHours().toString().padStart(2,'0')+':'+ahora.getMinutes().toString().padStart(2,'0');
    st.textContent='Guardado: '+hhmm;
    st.classList.add('saved');
    setTimeout(()=>{ btn.classList.remove('saving'); btn.innerHTML='💾 Guardar'; },2000);
    toast('✅ Guardado correctamente');
  }catch(err){
    toast('❌ Error al guardar: '+err.message);
  }
}

function cargarGuardado(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const payload = JSON.parse(raw);
    if(payload.data) data = payload.data;
    if(payload.pos)  pos  = payload.pos;
    if(payload.plantillas) plantillas = payload.plantillas;
    if(payload.origen) Object.assign(origen, payload.origen);
    if(payload.colNames) colNames = payload.colNames;
    if(payload.extraZonas) extraZonas = payload.extraZonas;
    if(payload.fechas) FECHAS=payload.fechas;
    if(payload.promInfo){ promInfo = payload.promInfo; }
    // Asegurar estructura promInfo para todos los días/equipos
    DIAS.forEach(d=>{ if(!promInfo[d]) promInfo[d]={}; EQUIPOS.forEach(eq=>{ if(!promInfo[d][eq]) promInfo[d][eq]={}; }); });
    // Asegurar que todos los equipos tienen sus colNames
    EQUIPOS.forEach(eq=>{ if(!colNames[eq]) colNames[eq]=[eq==='CASTILLA'?'1ER EQUIPO':'PROMOCIÓN','LESIÓN','OTROS']; if(eq==='CASTILLA' && colNames[eq][0]==='PROMOCIÓN') colNames[eq][0]='1ER EQUIPO'; });
    // Asegurar zonas banquillo
    for(const d of DIAS) for(const e of EQUIPOS){
      if(!data[d])    data[d]={};
      if(!data[d][e]) data[d][e]={};
      for(const z of ZONAS) if(!data[d][e][z]) data[d][e][z]=[];
    }
    // Sincronizar plantillas → disponibles:
    // Si un jugador está en plantillas pero no en ninguna zona de ese equipo ese día, añadirlo a disponibles
    EQUIPOS.forEach(eq=>{
      (plantillas[eq]||[]).forEach(nombre=>{
        DIAS.forEach(d=>{
          const enAlgunaZona = ZONAS.some(z=>(data[d][eq][z]||[]).includes(nombre));
          if(!enAlgunaZona){
            data[d][eq].disponibles.push(nombre);
          }
        });
      });
    });
    const ts = payload.ts ? new Date(payload.ts) : null;
    if(ts){
      const hhmm = ts.getHours().toString().padStart(2,'0')+':'+ts.getMinutes().toString().padStart(2,'0');
      const fecha = ts.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});
      document.getElementById('save-status').textContent='Cargado: '+fecha+' '+hhmm;
      document.getElementById('save-status').classList.add('saved');
    }
    return true;
  }catch(e){
    return false;
  }
}

// Exportar un equipo en un día concreto (al pulsar el contador)
function exportarEquipoDia(eq, d){
  const rows = [];
  // Título
  rows.push(['REAL MADRID CANTERA — '+eq+' — '+d]);
  rows.push(['']);

  const equipoData = data[d][eq];
  const maxLen = Math.max(
    equipoData.campo.length,
    equipoData.banquillo.length,
    equipoData.disponibles.length,
    equipoData.promovidos_1er.length,
    equipoData.lesionados.length,
    equipoData.otros.length
  );

  rows.push(['CAMPO ('+equipoData.campo.length+')','','BANQUILLO','','DISPONIBLES','','PROMOVIDO','LESIÓN','OTROS']);
  rows.push(['---','','---','','---','','---','---','---']);

  for(let i=0;i<Math.max(maxLen,1);i++){
    rows.push([
      equipoData.campo[i]||'',
      '',
      equipoData.banquillo[i]||'',
      '',
      equipoData.disponibles[i]||'',
      '',
      equipoData.promovidos_1er[i]||'',
      equipoData.lesionados[i]||'',
      equipoData.otros[i]||'',
    ]);
  }

  const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url;
  a.download=eq.replace(/ /g,'_')+'_'+d+'_'+new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'}).replace(/\//g,'-')+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('📥 Exportando '+eq+' — '+d);
}

// Exportar semana completa (todos los días, todos los equipos) → CSV multi-hoja simulado
function exportarSemana(){
  const rows = [];
  rows.push(['REAL MADRID CANTERA — SEMANA COMPLETA']);
  rows.push(['Generado: '+new Date().toLocaleString('es-ES')]);
  rows.push(['']);

  DIAS.forEach(d=>{
    rows.push(['══ '+d+' ══']);
    rows.push(['EQUIPO','ZONA','JUGADOR','EQUIPO_ORIGEN']);
    EQUIPOS.forEach(eq=>{
      const zonaData = data[d][eq];
      const zonasExport = [
        {key:'campo',       lbl:'Campo'},
        {key:'banquillo',   lbl:'Banquillo'},
        {key:'disponibles', lbl:'Disponible'},
        {key:'promovidos_1er',lbl:'Promovido'},
        {key:'lesionados',  lbl:'Lesión'},
        {key:'otros',       lbl:'Otros'},
      ];
      zonasExport.forEach(({key:z,lbl})=>{
        (zonaData[z]||[]).forEach(nombre=>{
          rows.push([eq, lbl, nombre, origen[nombre]||'']);
        });
      });
    });
    rows.push(['']);
  });

  // Añadir tabla registro al final
  rows.push(['══ REGISTRO DE ENTRENAMIENTO ══']);
  const header = ['JUGADOR','EQUIPO',...DIAS,'TOTAL_CAMPO','TOTAL_BANQUILLO'];
  rows.push(header);
  const allJugs = [...new Set([...Object.keys(origen)])].sort();
  allJugs.forEach(nombre=>{
    let tc=0, tb=0;
    const diasRow = DIAS.map(d=>{
      let estado='';
      EQUIPOS.forEach(eq=>{
        if((data[d][eq].campo||[]).includes(nombre))    estado='Campo';
        if((data[d][eq].banquillo||[]).includes(nombre) && !estado) estado='Banco';
      });
      if(estado==='Campo') tc++;
      if(estado==='Banco') tb++;
      return estado||'';
    });
    rows.push([nombre, origen[nombre]||'', ...diasRow, tc, tb]);
  });

  const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url;
  a.download='RM_Cantera_Semana_'+new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'}).replace(/\//g,'-')+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('📥 Exportando semana completa…');
}

// CALENDARIO MINI
// ══════════════════════════════════════════════════
let _calFecha = new Date(); // mes visible en el calendario
let _calLunesSel = null;    // lunes seleccionado

const MESES_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_DOW = ['L','M','X','J','V','S','D'];

function abrirCal(){
  // Iniciar en el lunes actual de FECHAS
  const partes = FECHAS['LUNES'] ? FECHAS['LUNES'].split('/') : null;
  if(partes){
    const hoy = new Date();
    _calFecha = new Date(hoy.getFullYear(), parseInt(partes[1])-1, parseInt(partes[0]));
    _calLunesSel = new Date(_calFecha);
  } else {
    _calFecha = new Date();
    _calLunesSel = null;
  }
  renderCal();
  document.getElementById('cal-overlay').classList.add('open');
}

function cerrarCal(){
  document.getElementById('cal-overlay').classList.remove('open');
}

function renderCal(){
  const mes = _calFecha.getMonth();
  const anyo = _calFecha.getFullYear();
  document.getElementById('cal-mes').textContent = MESES_ES[mes]+' '+anyo;

  // Calcular lunes seleccionado (de FECHAS actuales) para resaltar semana
  const lunesActual = (() => {
    const p = FECHAS['LUNES'] ? FECHAS['LUNES'].split('/') : null;
    if(!p) return null;
    return new Date(anyo, parseInt(p[1])-1, parseInt(p[0]));
  })();

  const grid = document.getElementById('cal-grid');
  grid.innerHTML='';

  // Cabecera días
  DIAS_DOW.forEach(d=>{
    const el=mk('div','cal-dow'); el.textContent=d; grid.appendChild(el);
  });

  // Primer día del mes → qué día de la semana es (lunes=0)
  const primerDia = new Date(anyo, mes, 1);
  let dow = primerDia.getDay(); // 0=dom
  dow = dow===0 ? 6 : dow-1;   // convertir a lunes=0

  // Celdas vacías inicio
  for(let i=0;i<dow;i++){
    const el=mk('div','cal-day vacio'); grid.appendChild(el);
  }

  const diasEnMes = new Date(anyo, mes+1, 0).getDate();
  const hoy = new Date(); hoy.setHours(0,0,0,0);

  for(let d=1;d<=diasEnMes;d++){
    const fecha = new Date(anyo, mes, d);
    const dowDia = fecha.getDay();
    const esLunes = dowDia===1;
    const el=mk('div','cal-day');
    el.textContent=d;

    // ¿Es hoy?
    if(fecha.getTime()===hoy.getTime()) el.classList.add('hoy');

    // ¿Está en la semana seleccionada?
    if(_calLunesSel){
      const domingo = new Date(_calLunesSel); domingo.setDate(_calLunesSel.getDate()+6);
      if(fecha>=_calLunesSel && fecha<=domingo){
        el.classList.add('semana-sel');
        if(esLunes) el.classList.add('lunes-sel');
        if(dowDia===0) el.classList.add('domingo-sel');
      }
    }

    // Solo los lunes son clicables
    if(esLunes){
      el.onclick=()=>{
        _calLunesSel = new Date(anyo, mes, d);
        const txt = d+'/'+(mes+1)+'/'+anyo;
        document.getElementById('cal-sel-txt').textContent = 'Semana del '+txt;
        renderCal();
      };
    } else {
      el.style.cursor='default';
      el.style.opacity='.6';
    }
    grid.appendChild(el);
  }

  // Actualizar texto
  if(_calLunesSel){
    const d=_calLunesSel.getDate(), m=_calLunesSel.getMonth()+1, a=_calLunesSel.getFullYear();
    document.getElementById('cal-sel-txt').textContent='Semana del '+d+'/'+m+'/'+a;
  } else {
    document.getElementById('cal-sel-txt').textContent='Selecciona un lunes';
  }
}

function aplicarSemana(){
  if(!_calLunesSel){ toast('Selecciona un lunes'); return; }
  FECHAS = calcFechasSemana(_calLunesSel);
  autoGuardar();
  renderDias();
  cerrarCal();
  toast('📅 Semana actualizada');
}

  const pw=cWrap.querySelector('.campo-players');
  d.campo.slice(0,30).forEach((nombre,i)=>{

    pof.style.top=p[0]+'%'; pof.style.left=p[1]+'%';

  card.appendChild(cWrap);

  zDisp.dataset.eq=eq; zDisp.dataset.zona='disponibles';
  const lblD=mk('div','zona-lbl'); lblD.textContent='DISPONIBLES';
  zDisp.appendChild(lblD);
  const cwD=mk('div','chips-wrap');
  d.disponibles.forEach(n=>cwD.appendChild(chip(n,eq,'disponibles','c-verde','cz')));
  zDisp.appendChild(cwD);
  zDisp.appendChild(buildAddInput(eq,'disponibles'));
  card.appendChild(zDisp);

  // Banquillo
  const zBanq=mk('div','zona-banquillo dz');
  zBanq.dataset.eq=eq; zBanq.dataset.zona='banquillo';

  zBanq.appendChild(lblB);
  const cwB=mk('div','chips-wrap');
  d.banquillo.forEach(n=>cwB.appendChild(chip(n,eq,'banquillo','c-azul','cz')));
  zBanq.appendChild(cwB);
  zBanq.appendChild(buildAddInput(eq,'banquillo'));
  card.appendChild(zBanq);

  // Añadir al campo — input debajo del banquillo
  const addCampoWrap = mk('div','');
  addCampoWrap.style.cssText='padding:3px 10px 4px;background:rgba(0,0,0,.06);border-top:1px solid rgba(0,0,0,.07);';
  addCampoWrap.appendChild(buildAddInput(eq,'campo'));
  card.appendChild(addCampoWrap);

  // Columnas estado — dinámicas con nombres editables
  if(!colNames[eq]) colNames[eq]=['PROMOCIÓN','LESIÓN','OTROS'];
  const colDefs = [
    {zona:'promovidos_1er', cls:'col col-prom',  cc:'c-naranja', idx:0},
    {zona:'lesionados',     cls:'col col-les',   cc:'c-rojo',    idx:1},
    {zona:'otros',          cls:'col col-otros', cc:'c-gris',    idx:2},
  ];
  if(extraZonas[eq]) colDefs.push({zona:'extra', cls:'col col-extra', cc:'c-gris', idx:3});

  const numCols = colDefs.length;

  cols.style.gridTemplateColumns = `repeat(${numCols},1fr)`;

  colDefs.forEach(({zona,cls,cc,idx})=>{

    const col=mk('div',cls+' dz');

    const lblWrap=mk('div','zona-lbl-wrap');
    const lbl=mk('input','zona-lbl-edit');
    lbl.type='text';
    lbl.value = colNames[eq][idx] || (zona==='extra'?'EXTRA':zona.toUpperCase());
    lbl.title='Pulsa para editar el nombre';
    lbl.onchange=()=>{
      if(!colNames[eq]) colNames[eq]=['PROMOCIÓN','LESIÓN','OTROS'];
      colNames[eq][idx]=lbl.value.trim().toUpperCase()||colNames[eq][idx];
      lbl.value=colNames[eq][idx];
      autoGuardar();

    lbl.onkeydown=(e)=>{ if(e.key==='Enter'||e.key==='Escape') lbl.blur(); e.stopPropagation(); };
    lblWrap.appendChild(lbl);

    // Botón eliminar columna extra
    if(zona==='extra'){
      const delBtn=mk('button','col-del-btn');
      delBtn.textContent='×'; delBtn.title='Eliminar columna extra';
      delBtn.onclick=(e)=>{ e.stopPropagation(); extraZonas[eq]=false; render(); };
      lblWrap.appendChild(delBtn);
    }

    // Botón añadir 4ª columna (solo en la última columna normal si no hay extra)
    if(idx===2 && !extraZonas[eq]){
      const addBtn=mk('button','col-add-btn');
      addBtn.textContent='+'; addBtn.title='Añadir 4ª columna';
      addBtn.onclick=(e)=>{ e.stopPropagation(); extraZonas[eq]=true;
        if(!colNames[eq][3]) colNames[eq][3]='EXTRA';
        render(); };
      lblWrap.appendChild(addBtn);
    }

    col.appendChild(lblWrap);
    const cw=mk('div','chips-wrap');
    d[zona].forEach(n=>{
      const c = chip(n,eq,zona,cc,'cz');
      // Si es promovidos y hay info de destino, añadir etiqueta
      if(zona==='promovidos_1er' && promInfo[dia]?.[eq]?.[n]){
        const dest = promInfo[dia][eq][n];
        c.textContent = n+' → '+dest;
        c.title = 'Con '+dest;
      }
      cw.appendChild(c);
    });
    col.appendChild(cw);
    cols.appendChild(col);
  });
  card.appendChild(cols);
  return card;

function chip(nombre,eq,zona,color,type){
  const eqO=origen[nombre];
  const prueba   = eqO === 'PRUEBA';
  const prestado = !prueba && eqO && eqO!==eq;
  let cf = prueba ? 'c-prueba' : (prestado ? (EQ_COLORS[eqO]||'c-prestado') : color);
  const multi = esMulti(nombre);
  const c=mk('div',`chip ${cf} ${multi?'c-multi':''} ${type}`);
  c.textContent=nombre; c.dataset.eq=eq; c.dataset.zona=zona; c.dataset.nombre=nombre;
  if(prueba) c.title='Jugador a prueba';
  else if(multi){
    const eqs = eqsDeNombre(dia,nombre).join(', ');
    c.title='En varios equipos hoy: '+eqs;
  }
  else if(prestado) c.title='De '+eqO;
  return c;
}
const EQ_COLORS={
  'CASTILLA':'c-prestado-CASTILLA',
  'RMC':'c-prestado-RMC',
  'JUVENIL A':'c-prestado-JUVENIL_A',
  'JUVENIL B':'c-prestado-JUVENIL_B',
  'JUVENIL C':'c-prestado-JUVENIL_C',
  'CADETE A':'c-prestado-CADETE_A'
};
function mk(tag,cls=''){const e=document.createElement(tag);if(cls)e.className=cls;return e;}

// ── Auto-promoción: mover jugador al equipo destino y registrar en origen
function autoPromocionar(nombre, eqOrigen, eqDestino){
  if(!eqOrigen || eqOrigen===eqDestino || eqOrigen==='PRUEBA') return;
  // Quitar de todas las zonas activas del equipo origen
  ZONAS_ACTIVAS.forEach(z=>{
    const arr = data[dia][eqOrigen]?.[z] || [];
    const i = arr.indexOf(nombre);
    if(i>=0) arr.splice(i,1);
  });
  // Añadir a promovidos_1er del equipo origen
  if(!data[dia][eqOrigen].promovidos_1er) data[dia][eqOrigen].promovidos_1er=[];
  if(!data[dia][eqOrigen].promovidos_1er.includes(nombre)){
    data[dia][eqOrigen].promovidos_1er.push(nombre);
  }
  // Registrar en promInfo
  if(!promInfo[dia]) promInfo[dia]={};
  if(!promInfo[dia][eqOrigen]) promInfo[dia][eqOrigen]={};
  promInfo[dia][eqOrigen][nombre] = eqDestino;
}

// ── Multi-equipo helpers
function registrarMultiEq(d, nombre, eq){
  if(!multiEq[d]) multiEq[d]={};
  if(!multiEq[d][nombre]) multiEq[d][nombre]=[];
  if(!multiEq[d][nombre].includes(eq)) multiEq[d][nombre].push(eq);
}
function borrarMultiEq(d, nombre, eq){
  if(!multiEq[d]?.[nombre]) return;
  multiEq[d][nombre] = multiEq[d][nombre].filter(e=>e!==eq);
  if(multiEq[d][nombre].length<=1) delete multiEq[d][nombre];
}
// Zonas que cuentan como "presencia activa" en un equipo (excluye promovidos_1er)
const ZONAS_ACTIVAS = ['campo','banquillo','disponibles','lesionados','otros','extra'];

function eqsDeNombre(d, nombre){
  // Equipos donde el jugador tiene presencia ACTIVA hoy (no como promovido)
  return EQUIPOS.filter(eq=>
    ZONAS_ACTIVAS.some(z=>(data[d]?.[eq]?.[z]||[]).includes(nombre))
  );
}
function esMulti(nombre){
  return eqsDeNombre(dia, nombre).length > 1;
}

// ══════════════════════════════════════════════════
// DRAG
// ══════════════════════════════════════════════════
function initDrag(){
  document.querySelectorAll('.cf').forEach(c=>{
    c.addEventListener('touchstart',e=>{e.preventDefault();startField(c,e.touches[0]);},{passive:false});
    c.addEventListener('mousedown', e=>{if(e.button)return;e.preventDefault();startField(c,e);});
  });
  document.querySelectorAll('.cz').forEach(c=>{
    c.addEventListener('touchstart',e=>{e.preventDefault();startZone(c,e.touches[0]);},{passive:false});
    c.addEventListener('mousedown', e=>{if(e.button)return;e.preventDefault();startZone(c,e);});
  });
}

function startField(c,ev){
  drag={mode:'field',c,pof:c.parentElement,campo:c.parentElement.closest('.campo-wrap'),eq:c.dataset.eq,nombre:c.dataset.nombre};
  c.classList.add('dragging');
  c.parentElement.classList.add('no-anim');
  const r=c.getBoundingClientRect();
  dOff.x=ev.clientX-r.left-r.width/2; dOff.y=ev.clientY-r.top-r.height/2;
  on('touchmove',moveField,{passive:false}); on('touchend',endField);
  on('mousemove',moveField); on('mouseup',endField);
}
function moveField(e){
  e.preventDefault&&e.preventDefault();
  if(!drag||drag.mode!=='field')return;
  const ev=e.touches?e.touches[0]:e;
  const cr=drag.campo.getBoundingClientRect();
  drag.pof.style.top  =clamp(((ev.clientY-dOff.y-cr.top   )/cr.height)*100,2,96)+'%';
  drag.pof.style.left =clamp(((ev.clientX-dOff.x-cr.left  )/cr.width )*100,2,97)+'%';
}
function endField(e){
  off('touchmove',moveField);off('touchend',endField);off('mousemove',moveField);off('mouseup',endField);
  if(!drag||drag.mode!=='field')return;
  drag.c.classList.remove('dragging');
  drag.pof.classList.remove('no-anim');
  const ev=e.changedTouches?e.changedTouches[0]:e;
  const cr=drag.campo.getBoundingClientRect();
  const inside=ev.clientX>=cr.left&&ev.clientX<=cr.right&&ev.clientY>=cr.top&&ev.clientY<=cr.bottom;
  if(!inside){
    move(drag.eq,'campo',drag.eq,'disponibles',drag.nombre);
    drag=null;render();return;
  }
  // Snap al slot más cercano
  const rawTop =clamp(((ev.clientY-dOff.y-cr.top   )/cr.height)*100,2,96);
  const rawLeft=clamp(((ev.clientX-dOff.x-cr.left  )/cr.width )*100,2,97);
  const [snapT,snapL] = snapToGrid(drag.eq, drag.nombre, rawTop, rawLeft);
  savePos(dia,drag.eq,drag.nombre,snapT,snapL);
  drag.pof.style.top  = snapT+'%';
  drag.pof.style.left = snapL+'%';
  updateCount(drag.eq);
  autoGuardar();
  drag=null;
}

function startZone(c,ev){
  drag={mode:'zone',c,eq:c.dataset.eq,zona:c.dataset.zona,nombre:c.dataset.nombre};
  c.classList.add('dragging');
  const g=document.getElementById('ghost');
  g.className='chip '+c.className.replace(/cf|cz|dragging/g,'').trim();
  g.textContent=c.dataset.nombre; g.style.display='block';
  const r=c.getBoundingClientRect();
  dOff.x=ev.clientX-r.left-r.width/2; dOff.y=ev.clientY-r.top-r.height/2;
  moveGhost(ev.clientX,ev.clientY);
  on('touchmove',moveZone,{passive:false});on('touchend',endZone);
  on('mousemove',moveZone);on('mouseup',endZone);
}
function moveZone(e){
  e.preventDefault&&e.preventDefault();
  if(!drag||drag.mode!=='zone')return;
  const ev=e.touches?e.touches[0]:e;
  moveGhost(ev.clientX,ev.clientY);
  document.querySelectorAll('.dz').forEach(z=>z.classList.remove('dz-active'));
  const t=document.elementFromPoint(ev.clientX,ev.clientY);
  if(t){const dz=t.closest('.dz');if(dz)dz.classList.add('dz-active');}
}
function endZone(e){
  off('touchmove',moveZone);off('touchend',endZone);off('mousemove',moveZone);off('mouseup',endZone);
  if(!drag||drag.mode!=='zone')return;
  document.getElementById('ghost').style.display='none';
  drag.c.classList.remove('dragging');
  document.querySelectorAll('.dz').forEach(z=>z.classList.remove('dz-active'));
  const ev=e.changedTouches?e.changedTouches[0]:e;
  const t=document.elementFromPoint(ev.clientX,ev.clientY);
  const dz=t&&t.closest('.dz');
  if(!dz){drag=null;return;}
  const toEq=dz.dataset.eq, toZona=dz.dataset.zona;
  if(drag.eq===toEq&&drag.zona===toZona){drag=null;return;}
  if(toZona==='campo'){
    const cr=dz.getBoundingClientRect();
    const rawT=clamp(((ev.clientY-cr.top )/cr.height)*100,2,96);
    const rawL=clamp(((ev.clientX-cr.left)/cr.width )*100,2,97);
    const [snapT,snapL]=snapToGrid(toEq,drag.nombre,rawT,rawL);
    savePos(dia,toEq,drag.nombre,snapT,snapL);
  }
  move(drag.eq,drag.zona,toEq,toZona,drag.nombre);
  drag=null;render();
}

const ZONA_NAMES={campo:'Campo',banquillo:'Banquillo',disponibles:'Disponibles',promovidos_1er:'Promovido',lesionados:'Lesión',otros:'Otros'};

function move(fromEq,fromZona,toEq,toZona,nombre){
  const arr=data[dia][fromEq][fromZona];
  const i=arr.indexOf(nombre); if(i===-1)return;

  // ── Movimiento dentro del mismo equipo
  if(fromEq === toEq){
    arr.splice(i,1);
    data[dia][toEq][toZona].push(nombre);
    toast(nombre+' → '+ZONA_NAMES[toZona]);
    return;
  }

  // ── Movimiento entre equipos distintos
  const eqOrigen = origen[nombre];

  // ¿Ya tiene presencia activa en otro equipo (distinto del origen del drag)?
  const yaActivoEnOtro = EQUIPOS.some(e=> e!==fromEq && e!==toEq &&
    ZONAS_ACTIVAS.some(z=>(data[dia][e]?.[z]||[]).includes(nombre))
  );

  arr.splice(i,1); // Quitar de zona origen

  if(yaActivoEnOtro){
    // Multi-equipo: añadir al destino y marcar rojo en todos
    registrarMultiEq(dia, nombre, toEq);
    registrarMultiEq(dia, nombre, fromEq);
    data[dia][toEq][toZona].push(nombre);
    toast('🔴 '+nombre+' en varios equipos hoy');
    return;
  }

  // ¿Vuelve a su equipo de origen? → limpiar promoción
  if(toEq === eqOrigen){
    if(promInfo[dia]?.[toEq]?.[nombre]) delete promInfo[dia][toEq][nombre];
    // Quitar de promovidos_1er del equipo origen si estaba ahí
    const pArr = data[dia][toEq]?.promovidos_1er || [];
    const pi = pArr.indexOf(nombre);
    if(pi>=0) pArr.splice(pi,1);
    borrarMultiEq(dia, nombre, fromEq);
    data[dia][toEq][toZona].push(nombre);
    toast(nombre+' → '+ZONA_NAMES[toZona]);
    return;
  }

  // ¿Va a un equipo distinto al suyo? → auto-promoción
  if(eqOrigen && eqOrigen !== toEq && eqOrigen !== 'PRUEBA'){
    autoPromocionar(nombre, eqOrigen, toEq);
  }

  data[dia][toEq][toZona].push(nombre);
  toast(nombre+' → '+ZONA_NAMES[toZona]);
}

// ══════════════════════════════════════════════════
// COPIAR DÍA
// ══════════════════════════════════════════════════
function copyDia(from,to,btn){
  EQUIPOS.forEach(eq=>{
    data[to][eq]=JSON.parse(JSON.stringify(data[from][eq]));
    data[from][eq].campo.forEach(n=>{
      const k=key(from,eq,n);
      if(pos[k]) pos[key(to,eq,n)]=[...pos[k]];
    });
  });
  btn.classList.add('copy-active');
  btn.textContent='✓ '+to;
  toast('Día '+from+' copiado a '+to);
  setTimeout(()=>{btn.textContent=to;btn.classList.remove('copy-active');},2000);
}

// ══════════════════════════════════════════════════
// MODAL REGISTRO DE ENTRENAMIENTO
// ══════════════════════════════════════════════════
function openReg(){
  document.getElementById('reg-overlay').classList.add('show');
  renderReg();
}
function closeReg(){
  document.getElementById('reg-overlay').classList.remove('show');
}

function renderReg(){
  const q=(document.getElementById('reg-search').value||'').toLowerCase().trim();

  // Construir cabecera
  const thead=document.getElementById('reg-thead');
  thead.innerHTML='';
  const hr=document.createElement('tr');
  const th0=document.createElement('th'); th0.textContent='Jugador'; hr.appendChild(th0);
  DIAS.forEach(d=>{
    const th=document.createElement('th'); th.textContent=d.slice(0,3); hr.appendChild(th);
  });
  const thT=document.createElement('th'); thT.textContent='TOTAL'; hr.appendChild(thT);
  const thB=document.createElement('th'); thB.textContent='BANCO'; hr.appendChild(thB);
  thead.appendChild(hr);

  // Recolectar todos los jugadores únicos de todos los equipos
  const allJugadores = new Set();
  EQUIPOS.forEach(eq=>{
    Object.values(origen).forEach((eqO,_)=>{if(eqO===eq) allJugadores.add(_);});
    DIAS.forEach(d=>ZONAS.forEach(z=>data[d][eq][z].forEach(n=>allJugadores.add(n))));
  });
  // Añadir todos del origen también
  Object.keys(origen).forEach(n=>allJugadores.add(n));

  const filtrados=[...allJugadores].filter(n=>!q||n.toLowerCase().includes(q)).sort();

  const tbody=document.getElementById('reg-tbody');
  tbody.innerHTML='';

  filtrados.forEach(nombre=>{
    const eqOrig=origen[nombre]||'—';
    // Para cada día: ¿está en campo o banquillo?
    let totalCampo=0, totalBanco=0;
    const row=document.createElement('tr');
    const td0=document.createElement('td');
    td0.innerHTML=`<span style="font-size:9px;opacity:.55">${eqOrig.slice(0,4)}</span><br>${nombre}`;
    row.appendChild(td0);

    DIAS.forEach(d=>{
      const td=document.createElement('td');
      td.className='reg-day-cell';
      // Buscar en todos los equipos
      let estado=''; // '' = no aparece, 'campo' = en campo, 'banco' = en banquillo
      EQUIPOS.forEach(eq=>{
        if(data[d][eq].campo.includes(nombre))    estado='campo';
        if(data[d][eq].banquillo.includes(nombre) && estado!=='campo') estado='banco';
      });
      if(estado==='campo'){
        totalCampo++;
        const dot=mk('span','reg-dot active'); dot.textContent='✓'; td.appendChild(dot);
      } else if(estado==='banco'){
        totalBanco++;
        const dot=mk('span','reg-dot banco'); dot.textContent='B'; td.appendChild(dot);
      } else {
        const dot=mk('span','reg-dot empty'); dot.textContent='·'; td.appendChild(dot);
      }
      row.appendChild(td);
    });

    const tdT=document.createElement('td'); tdT.className='reg-total'; tdT.textContent=totalCampo; row.appendChild(tdT);
    const tdB=document.createElement('td'); tdB.style.color='#3b82f6'; tdB.style.fontWeight='700'; tdB.textContent=totalBanco||''; row.appendChild(tdB);
    tbody.appendChild(row);
  });
}

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
function moveGhost(x,y){const g=document.getElementById('ghost');g.style.left=(x-dOff.x)+'px';g.style.top=(y-dOff.y)+'px';}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function on(ev,fn,opts){document.addEventListener(ev,fn,opts);}
function off(ev,fn){document.removeEventListener(ev,fn);}

let alertCb=null;
function showAlert(msg,onConfirm){
  document.getElementById('alert-msg').textContent=msg;
  document.getElementById('alert-overlay').classList.add('show');
  alertCb=onConfirm;
  document.getElementById('alert-ok-btn').onclick=()=>{closeAlert();if(alertCb)alertCb();};
}
function closeAlert(){
  document.getElementById('alert-overlay').classList.remove('show');
  alertCb=null;
}

let tT=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2200);}

// Intentar cargar guardado previo
const cargado = cargarGuardado();
if(cargado) toast('✅ Datos restaurados desde guardado anterior');
render();
</script>
